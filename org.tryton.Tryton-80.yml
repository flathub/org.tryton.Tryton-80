id: org.tryton.Tryton-80
sdk: org.gnome.Sdk
runtime: org.gnome.Platform
runtime-version: '50'
command: tryton
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --share=network
modules:
  - python3-tryton.json
  - name: integration
    buildsystem: simple
    build-commands:
      - install -D --mode=0644 -t /app/share/icons/hicolor/scalable/apps/ org.tryton.Tryton-80.svg
      - install -D --mode=0644 -t /app/share/applications/ org.tryton.Tryton-80.desktop
      - install -D --mode=0644 -t /app/share/metainfo/ org.tryton.Tryton-80.appdata.xml
    sources:
      - type: file
        path: org.tryton.Tryton-80.svg
      - type: file
        path: org.tryton.Tryton-80.desktop
      - type: file
        path: org.tryton.Tryton-80.appdata.xml
